<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 100 100">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#3c1f5e"/>
      <stop offset="100%" stop-color="#1a0d2e"/>
    </radialGradient>
    <linearGradient id="thermo" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e8825a"/>
      <stop offset="100%" stop-color="#6ec6e0"/>
    </linearGradient>
  </defs>
  <!-- Background circle -->
  <circle cx="50" cy="50" r="50" fill="url(#bg)"/>
  <!-- Thermometer body -->
  <rect x="43" y="15" width="14" height="45" rx="7" fill="#d0cde0" opacity="0.9"/>
  <!-- Mercury fill -->
  <rect x="45" y="35" width="10" height="25" rx="5" fill="url(#thermo)"/>
  <!-- Bulb -->
  <circle cx="50" cy="72" r="12" fill="#d0cde0" opacity="0.9"/>
  <circle cx="50" cy="72" r="9" fill="#e8825a"/>
  <!-- Tick marks -->
  <line x1="43" y1="25" x2="38" y2="25" stroke="#d0cde0" stroke-width="2" opacity="0.6"/>
  <line x1="43" y1="35" x2="38" y2="35" stroke="#d0cde0" stroke-width="2" opacity="0.6"/>
  <line x1="43" y1="45" x2="38" y2="45" stroke="#d0cde0" stroke-width="2" opacity="0.6"/>
  <line x1="43" y1="55" x2="38" y2="55" stroke="#d0cde0" stroke-width="2" opacity="0.6"/>
</svg>